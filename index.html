/* ── Override: primeiro iframe ativo agora é tres-candles ── */
window.addEventListener('DOMContentLoaded', () => {
    const firstIframe = document.getElementById('iframe-tres-candles');
    if (!firstIframe) return;
    const adjust = () => {
        try {
            const body = firstIframe.contentDocument.body;
            const html = firstIframe.contentDocument.documentElement;
            const h = Math.max(
                body.scrollHeight, body.offsetHeight,
                html.scrollHeight, html.offsetHeight
            );
            firstIframe.style.height = Math.max(h, window.innerHeight - 58) + 'px';
        } catch(e) {
            firstIframe.style.height = Math.max(window.innerHeight * 2, 1400) + 'px';
        }
    };
    if (firstIframe.contentDocument?.readyState === 'complete') adjust();
    else firstIframe.addEventListener('load', adjust, { once: true });
});
</script>
